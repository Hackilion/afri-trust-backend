<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfriTrust SDK Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      line-height: 1.45;
      min-height: 100vh;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 1.25rem 1rem 2rem; }
    header { margin-bottom: 1.25rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    header p { font-size: 0.875rem; color: #64748b; margin-top: 0.25rem; }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 320px) 1fr;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem 1rem 1.1rem;
    }
    .card h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 0.25rem;
    }
    input, select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 0.65rem;
      background: #fff;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }
    .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .row label { margin: 0; font-weight: 400; color: #475569; font-size: 0.8125rem; }
    .row input[type="checkbox"] { width: auto; margin: 0 0.35rem 0 0; accent-color: #3b82f6; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary { background: #2563eb; color: #fff; margin-top: 0.35rem; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #fff;
      color: #334155;
      border: 1px solid #e2e8f0;
      margin-top: 0.5rem;
    }
    .btn-secondary:hover { background: #f8fafc; }
    .btn-inline {
      width: auto;
      padding: 0.4rem 0.65rem;
      font-size: 0.8125rem;
      font-weight: 500;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      margin-bottom: 0.65rem;
    }
    .btn-inline:hover { background: #e2e8f0; }

    .inline-h { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.25rem; }
    .inline-h label { margin: 0; }

    .msg { font-size: 0.75rem; padding: 0.45rem 0.5rem; border-radius: 6px; margin-bottom: 0.5rem; }
    .msg-err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .msg-ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .hidden { display: none !important; }

    .seg {
      display: flex;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 0.65rem;
    }
    .seg button {
      flex: 1;
      padding: 0.45rem;
      font-size: 0.8125rem;
      font-weight: 500;
      border: none;
      background: #f8fafc;
      color: #64748b;
      cursor: pointer;
      font-family: inherit;
    }
    .seg button[data-on="1"] { background: #fff; color: #0f172a; box-shadow: inset 0 0 0 1px #e2e8f0; }

    .frame {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .frame[data-m="mobile"] { max-width: 390px; margin: 0 auto; }
    .viewport {
      background: #f8fafc;
      min-height: 400px;
      overflow: auto;
    }
    .frame[data-m="mobile"] .viewport { min-height: 520px; }

    .placeholder {
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .log { margin-top: 1rem; }
    .log h3 { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #94a3b8; margin-bottom: 0.4rem; }
    .log pre {
      font-size: 0.7rem;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 0.6rem 0.65rem;
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AfriTrust Web SDK demo</h1>
      <p>Embed preview against your API. Load workflows, then launch — duplicate applicants reuse the same record automatically.</p>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Setup</h2>

        <label for="api-key">API key</label>
        <input type="password" id="api-key" autocomplete="off" placeholder="Required">

        <label for="api-url">API base URL</label>
        <input type="text" id="api-url" value="http://localhost:8000">

        <div class="inline-h">
          <label for="workflow-select">Workflow</label>
          <button type="button" class="btn btn-inline" id="load-workflows-btn">Load list</button>
        </div>
        <div id="load-msg" class="hidden"></div>
        <select id="workflow-select" disabled>
          <option value="">Load workflows first</option>
        </select>

        <label for="workflow-override">Workflow ID or 6-digit code (optional)</label>
        <input type="text" id="workflow-override" placeholder="Overrides dropdown if set">

        <label for="full-name">Full name</label>
        <input type="text" id="full-name" value="Demo User">

        <label for="email">Email</label>
        <input type="email" id="email" value="demo@example.com">

        <label for="phone">Phone (optional)</label>
        <input type="text" id="phone" value="+251911000000">

        <div class="row" style="margin-bottom:0.5rem;">
          <input type="checkbox" id="fresh-applicant" checked>
          <label for="fresh-applicant">New applicant each launch</label>
        </div>
        <p style="font-size:0.7rem;color:#94a3b8;margin-bottom:0.65rem;">Uncheck to reuse one demo applicant (same external id).</p>

        <label for="theme-select">Widget theme</label>
        <select id="theme-select">
          <option value="ocean">Ocean</option>
          <option value="slate">Slate</option>
          <option value="rose">Rose</option>
          <option value="minimal">Minimal</option>
        </select>

        <div class="row" style="margin-bottom:0.65rem;">
          <input type="checkbox" id="doc-ai" checked>
          <label for="doc-ai">AI hints on document images (needs server OpenRouter key)</label>
        </div>

        <label>Preview</label>
        <div class="seg" id="seg-device">
          <button type="button" data-device="desktop" data-on="1">Desktop</button>
          <button type="button" data-device="mobile" data-on="0">Mobile</button>
        </div>

        <button type="button" class="btn btn-primary" id="launch-btn">Launch</button>
        <button type="button" class="btn btn-secondary" id="reset-btn">Reset</button>
      </div>

      <div>
        <div class="frame" id="device-frame" data-m="desktop">
          <div class="viewport" id="kyc-container">
            <div class="placeholder" id="placeholder">Choose workflow and press Launch.</div>
          </div>
        </div>
        <div class="card log">
          <h3>Events</h3>
          <pre id="event-log">—</pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/sdk/afritrust.js"></script>
  <script>
    (function () {
      var workflows = [];
      var STABLE_EXTERNAL_ID = "afritrust-sdk-demo";

      function log(msg) {
        var el = document.getElementById("event-log");
        if (el.textContent === "—") el.textContent = "";
        var ts = new Date().toLocaleTimeString();
        el.textContent += "[" + ts + "] " + (typeof msg === "string" ? msg : JSON.stringify(msg, null, 2)) + "\n";
        el.scrollTop = el.scrollHeight;
      }

      function setLoadMsg(text, kind) {
        var box = document.getElementById("load-msg");
        if (!text) { box.className = "hidden"; box.textContent = ""; return; }
        box.className = "msg " + (kind === "err" ? "msg-err" : "msg-ok");
        box.textContent = text;
      }

      function normBase(url) {
        return String(url || "").replace(/\/+$/, "");
      }

      document.getElementById("load-workflows-btn").addEventListener("click", function () {
        var apiKey = document.getElementById("api-key").value.trim();
        var baseUrl = normBase(document.getElementById("api-url").value.trim());
        if (!apiKey) { setLoadMsg("Enter API key first.", "err"); return; }
        setLoadMsg("Loading…", "ok");
        fetch(baseUrl + "/v1/sdk-demo/published-workflows", { headers: { "X-API-Key": apiKey } })
          .then(function (res) { return res.json().then(function (data) { return { res: res, data: data }; }); })
          .then(function (o) {
            if (!o.res.ok) {
              var d = o.data.detail || o.res.statusText;
              setLoadMsg("Failed: " + (typeof d === "string" ? d : JSON.stringify(d)), "err");
              return;
            }
            workflows = Array.isArray(o.data) ? o.data : [];
            var sel = document.getElementById("workflow-select");
            sel.innerHTML = "";
            if (workflows.length === 0) {
              sel.disabled = true;
              sel.innerHTML = "<option value=\"\">No published workflows</option>";
              setLoadMsg("No published workflows.", "err");
              return;
            }
            sel.disabled = false;
            sel.appendChild(new Option("Select…", ""));
            workflows.forEach(function (w) {
              sel.appendChild(new Option(w.name + " · " + (w.step_count || 0) + " steps", w.id));
            });
            setLoadMsg(workflows.length + " workflow(s).", "ok");
          })
          .catch(function (e) { setLoadMsg(String(e.message || e), "err"); });
      });

      document.getElementById("seg-device").addEventListener("click", function (e) {
        var btn = e.target.closest("button[data-device]");
        if (!btn) return;
        var mode = btn.getAttribute("data-device");
        document.getElementById("device-frame").setAttribute("data-m", mode === "mobile" ? "mobile" : "desktop");
        document.querySelectorAll("#seg-device button").forEach(function (b) {
          b.setAttribute("data-on", b.getAttribute("data-device") === mode ? "1" : "0");
        });
      });

      function resetDemo() {
        var container = document.getElementById("kyc-container");
        container.innerHTML = "<div class=\"placeholder\" id=\"placeholder\">Choose workflow and press Launch.</div>";
        document.getElementById("launch-btn").disabled = false;
        document.getElementById("launch-btn").textContent = "Launch";
        log("Reset.");
      }

      document.getElementById("reset-btn").addEventListener("click", resetDemo);

      document.getElementById("launch-btn").addEventListener("click", function () {
        var apiKey = document.getElementById("api-key").value.trim();
        var baseUrl = normBase(document.getElementById("api-url").value.trim());
        var override = document.getElementById("workflow-override").value.trim();
        var workflowId = override || document.getElementById("workflow-select").value.trim();
        if (!apiKey || !workflowId) {
          alert("API key and workflow are required.");
          return;
        }

        var fresh = document.getElementById("fresh-applicant").checked;
        var externalId = fresh ? ("sdk-demo-" + Date.now()) : STABLE_EXTERNAL_ID;
        var applicant = {
          external_id: externalId,
          full_name: document.getElementById("full-name").value.trim() || "Demo User",
          email: document.getElementById("email").value.trim() || "demo@example.com",
          phone: document.getElementById("phone").value.trim() || undefined
        };

        var w = workflows.find(function (x) { return x.id === workflowId; });
        var container = document.getElementById("kyc-container");
        container.innerHTML = "";
        var div = document.createElement("div");
        div.id = "kyc-widget";
        container.appendChild(div);

        log("Starting… external_id=" + externalId);
        AfriTrust.start({
          apiKey: apiKey,
          baseUrl: baseUrl,
          containerId: "kyc-widget",
          workflowId: workflowId,
          applicant: applicant,
          theme: document.getElementById("theme-select").value,
          documentIntelligence: document.getElementById("doc-ai").checked,
          widgetTitle: w ? w.name : "Verification",
          widgetSubtitle: w ? ((w.step_count || 0) + " steps") : "AfriTrust",
          onComplete: function (r) { log("COMPLETE: " + JSON.stringify(r)); },
          onError: function (err) { log("ERROR: " + JSON.stringify(err)); },
          onStepChange: function (s) { log("STEP: " + JSON.stringify(s)); }
        });

        document.getElementById("launch-btn").disabled = true;
        document.getElementById("launch-btn").textContent = "Running…";
      });
    })();
  </script>
</body>
</html>
