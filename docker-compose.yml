version: "3.9"

services:
  api:
    build: .
    ports:
      - "18088:8000"
    env_file:
      - .env.production
    volumes:
      - uploads:/app/uploads
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  uploads:
  db_data:
