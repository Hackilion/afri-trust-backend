version: "3.9"

services:
  api:
    build: .
    env_file:
      - .env.production
    volumes:
      - uploads:/app/uploads
      - db_data:/app/data
    restart: unless-stopped
    ports:
      - 18088:8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
  db_data:
